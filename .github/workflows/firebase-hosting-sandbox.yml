name: Deploy to sandbox environment
on:
  push:
    branches:
      - sandbox
  workflow_dispatch:

jobs:
  # Run quality checks in parallel
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check: [lint, test, types]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache node_modules for faster dependency installation
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Cache tool-specific artifacts
      - name: Cache tool artifacts
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            .tsbuildinfo
            .jest-cache
          key: ${{ runner.os }}-${{ matrix.check }}-${{ hashFiles('eslint.config.js', 'tsconfig.json', 'jest.config.cjs', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.check }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci --prefer-offline --no-audit --progress=false

      - name: Run ${{ matrix.check }}
        run: npm run ci:${{ matrix.check }}

  # Build after quality checks pass
  build:
    needs: quality
    runs-on: ubuntu-latest
    env:
      GENERATE_SOURCEMAP: true
      VITE_TIMERISE_API: "${{ secrets.SANDBOX_VITE_TIMERISE_API }}"
      VITE_TIMERISE_WS: "${{ secrets.SANDBOX_VITE_TIMERISE_WS }}"
      VITE_TIMERISE_TOOLS_API: "${{ secrets.SANDBOX_VITE_TIMERISE_TOOLS_API }}"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache node_modules for faster dependency installation
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Cache Vite build artifacts
      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('vite.config.ts', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npm ci --prefer-offline --no-audit --progress=false

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -d "build" ] || [ -z "$(ls -A build)" ]; then
            echo "Build directory is empty or missing!"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "index.html not found in build directory!"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/
          retention-days: 7
          if-no-files-found: error

  # Deploy after build completes
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: sandbox
      url: https://sandbox-booking.timerise.io
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: build/

      - name: Verify downloaded build
        run: |
          if [ ! -d "build" ] || [ -z "$(ls -A build)" ]; then
            echo "Downloaded build directory is empty or missing!"
            exit 1
          fi

      - name: Debug - List Build Directory
        run: ls -R build

      - name: Debug - Verify Firebase Access
        run: firebase projects:list --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIMERISE_SANDBOX }}"

      - name: Deploy to Firebase
        id: deploy
        run: |
          firebase deploy \
            --only hosting:service-app \
            --project timerise-sandbox \
            --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIMERISE_SANDBOX }}" \
            --debug

      - name: Health check
        uses: nick-fields/retry@v3
        with:
          timeout_seconds: 30
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            curl -f -s -o /dev/null -w "%{http_code}" \
              "https://sandbox-booking.timerise.io/service/E95rBw4j9Thhts2vzY1Y" | grep -q "200"

      - name: Create deployment summary
        if: success()
        run: |
          echo "## Deployment Successful ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Sandbox" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://sandbox-booking.timerise.io" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
